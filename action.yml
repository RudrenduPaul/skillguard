name: 'SkillGuard'
description: 'Scan a third-party AI agent-skill directory (SKILL.md, hooks, scripts) for known attack patterns and gate your CI on the result.'
author: 'Rudrendu Paul'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  path:
    description: 'Path to the skill directory to scan.'
    required: true
  severity-threshold:
    description: 'Minimum severity that fails the check: HIGH, MEDIUM, or LOW.'
    required: false
    default: 'HIGH'
  timeout:
    description: 'Per-file scan timeout in milliseconds.'
    required: false
    default: '10000'
  skillguardignore:
    description: 'Path to a .skillguardignore file. Never auto-loaded from inside the scanned path -- leave unset to scan with no path suppressions.'
    required: false
    default: ''
  allow-inline-suppression:
    description: 'Honor inline "# skillguard-ignore: SGxx" comments found inside the scanned files. Off by default -- only enable for a path you already trust.'
    required: false
    default: 'false'
  sarif-output:
    description: 'Path to write the SARIF report to, for github/codeql-action/upload-sarif.'
    required: false
    default: 'skillguard-results.sarif'

outputs:
  sarif-file:
    description: 'Path to the generated SARIF report.'
    value: ${{ steps.scan.outputs.sarif-file }}

runs:
  using: 'composite'
  steps:
    # Scans and writes SARIF, but always exits 0 here -- the gate decision
    # happens in the final step, after the SARIF upload runs, so a failing
    # scan still shows up in GitHub code scanning instead of being lost.
    #
    # Inputs are passed via env: rather than interpolated into the script
    # with ${{ }} -- GitHub Actions substitutes ${{ }} expressions into the
    # script text before the shell ever runs it, so any input value
    # containing shell metacharacters would otherwise be executed verbatim.
    - name: Run SkillGuard (SARIF output, the default format)
      id: scan
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_SEVERITY_THRESHOLD: ${{ inputs.severity-threshold }}
        INPUT_TIMEOUT: ${{ inputs.timeout }}
        INPUT_SKILLGUARDIGNORE: ${{ inputs.skillguardignore }}
        INPUT_ALLOW_INLINE_SUPPRESSION: ${{ inputs.allow-inline-suppression }}
        INPUT_SARIF_OUTPUT: ${{ inputs.sarif-output }}
      run: |
        set -o pipefail
        IGNORE_FLAG=()
        if [ -n "$INPUT_SKILLGUARDIGNORE" ]; then
          IGNORE_FLAG=(--skillguardignore "$INPUT_SKILLGUARDIGNORE")
        fi
        SUPPRESS_FLAG=()
        if [ "$INPUT_ALLOW_INLINE_SUPPRESSION" = "true" ]; then
          SUPPRESS_FLAG=(--allow-inline-suppression)
        fi
        npx --yes skillguard-cli scan "$INPUT_PATH" \
          --format sarif \
          --severity-threshold "$INPUT_SEVERITY_THRESHOLD" \
          --timeout "$INPUT_TIMEOUT" \
          "${IGNORE_FLAG[@]}" \
          "${SUPPRESS_FLAG[@]}" \
          > "$INPUT_SARIF_OUTPUT"
        echo "exit-code=$?" >> "$GITHUB_OUTPUT"
        echo "sarif-file=$INPUT_SARIF_OUTPUT" >> "$GITHUB_OUTPUT"

    - name: Upload SARIF to GitHub code scanning
      uses: github/codeql-action/upload-sarif@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3
      with:
        sarif_file: ${{ steps.scan.outputs.sarif-file }}

    - name: Gate on SkillGuard result
      shell: bash
      env:
        SCAN_EXIT_CODE: ${{ steps.scan.outputs.exit-code }}
      run: |
        if [ "$SCAN_EXIT_CODE" != "0" ]; then
          echo "SkillGuard found findings at or above the configured severity threshold (exit code $SCAN_EXIT_CODE). See the Security tab for details."
          exit "$SCAN_EXIT_CODE"
        fi
